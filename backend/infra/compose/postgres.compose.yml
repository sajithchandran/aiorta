services:
  postgres:
    image: postgres:16-alpine
    container_name: aiorta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aiorta}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-54329}:5432"
    volumes:
      - aiorta_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-aiorta}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  aiorta_postgres_data:
